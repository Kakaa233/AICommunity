server.port=8081
#druid
spring.datasource.url=jdbc:mysql://localhost:3306/wego?characterEncoding=utf-8&serverTimezone=GMT%2B8
spring.datasource.username=root
#饱饱们把这个改成你mysql的密码
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.druid.filters=stat,wall
spring.datasource.druid.initial-size=100
spring.datasource.druid.min-idle=500
spring.datasource.druid.max-active=1000
## 配置获取连接等待超时的时间
spring.datasource.druid.max-wait=60000
## 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
spring.datasource.druid.time-between-eviction-runs-millis=60000
## 配置一个连接在池中最小生存时间，单位是毫秒
spring.datasource.druid.min-evictable-idle-time-millis=25200000
spring.datasource.druid.validation-query=SELECT 'x'  
spring.datasource.druid.test-while-idle=false
spring.datasource.druid.test-on-borrow=false
spring.datasource.druid.test-on-return=false
spring.datasource.druid.pool-prepared-statements=true
spring.datasource.druid.max-pool-prepared-statement-per-connection-size=20
#开启驼峰映射
mybatis.configuration.map-underscore-to-camel-case=true
#redis
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=1000
spring.redis.jedis.pool.max-active=1000
spring.redis.jedis.pool.max-idle=800
spring.redis.jedis.pool.min-idle=500
spring.redis.jedis.pool.max-wait=500
